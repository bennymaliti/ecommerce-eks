# ─────────────────────────────────────────────────────────────────────────────
# Backend API — Node.js REST API
# ─────────────────────────────────────────────────────────────────────────────

# ServiceAccount — annotated with IRSA role ARN so pods can access S3
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: ecommerce
  annotations:
    # Replace with your actual role ARN from: terraform output backend_irsa_role_arn
    eks.amazonaws.com/role-arn: arn:aws:iam:::role/ecommerce-prod-backend-role
  labels:
    app: backend
---
# ConfigMap — non-sensitive runtime configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ecommerce
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  DB_PORT: "3306"
  DB_NAME: "ecommerce"
  # S3 bucket from terraform output s3_bucket_name
  S3_BUCKET: "ecommerce-prod-images-ACCOUNT_ID"
  AWS_REGION: "us-east-1"
  CORS_ORIGIN: "https://yourdomain.com"
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ecommerce
  labels:
    app: backend
    version: v1
  annotations:
    # Prometheus scraping annotation
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  replicas: 2   # Minimum 2 for HA (HPA will scale beyond this)
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # Zero-downtime deployments
      maxSurge: 1          # Allow one extra pod during rollout
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      serviceAccountName: backend
      # Spread pods across nodes and AZs for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [backend]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          # Replace ACCOUNT_ID and REGION with your values
          image: 919399847940.dkr.ecr.eu-west-2.amazonaws.com/ecommerce-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          # Load non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: backend-config
          # Load sensitive config from Secrets
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt_secret
          # Resource limits — critical for HPA to function correctly
          resources:
            requests:
              cpu: "100m"      # 0.1 CPU core
              memory: "256Mi"
            limits:
              cpu: "500m"      # 0.5 CPU core
              memory: "512Mi"
          # Liveness probe — restart pod if it deadlocks
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          # Readiness probe — don't send traffic until pod is ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          # Startup probe — gives slow starts extra time before liveness kicks in
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12   # 60 seconds total startup time
          # Graceful shutdown — allow in-flight requests to complete
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
      # Security context — run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
# Service — internal ClusterIP for frontend to reach backend
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ecommerce
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
