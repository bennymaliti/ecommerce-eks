# ─────────────────────────────────────────────────────────────────────────────
# ALB Ingress — AWS Load Balancer Controller provisions an Application Load
# Balancer in public subnets. Routes traffic to frontend and backend services.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    
    # Internet-facing — publicly accessible
    alb.ingress.kubernetes.io/scheme: internet-facing

    # Target type: ip sends traffic directly to pod IPs (better latency than instance)
    alb.ingress.kubernetes.io/target-type: ip

    # Subnet selection — ALB goes in public subnets (tagged kubernetes.io/role/elb=1)
    alb.ingress.kubernetes.io/subnets: subnet-0250bd26108d4a643,subnet-0b267f210ee966a51,subnet-06292aaec7b31a695  # Replace with public subnet IDs from terraform output

    # Security group for the ALB (allows HTTP/HTTPS from internet)
    alb.ingress.kubernetes.io/security-groups: sg-0bb52aebe1ca7098f  # Replace with ALB SG from terraform output

    # Enable HTTP→HTTPS redirect (uncomment when SSL cert is set up)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-2:919399847940:certificate/1ba615a2-024c-440c-a62b-1038f3c61012

    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Stickiness — useful for session-based workloads
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400

    # Tags on the ALB resource
    alb.ingress.kubernetes.io/tags: Project=ecommerce,Environment=prod,ManagedBy=kubernetes

    # Access logs (optional but useful for debugging and compliance)
    # alb.ingress.kubernetes.io/load-balancer-attributes: access_logs.s3.enabled=true,access_logs.s3.bucket=my-access-logs-bucket

  labels:
    app: ecommerce-ingress

spec:
  ingressClassName: alb
  rules:
    - host: store.bennymaliti.co.uk
      http:
        paths:
          # API routes — all /api/* requests go to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          # Frontend — all other requests go to React/Nginx
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
