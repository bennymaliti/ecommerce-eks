# ─────────────────────────────────────────────────────────────────────────────
# ALB Ingress — AWS Load Balancer Controller provisions an Application Load
# Balancer in public subnets. Routes traffic to frontend and backend services.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    
    # Internet-facing — publicly accessible
    alb.ingress.kubernetes.io/scheme: internet-facing

    # Target type: ip sends traffic directly to pod IPs (better latency than instance)
    alb.ingress.kubernetes.io/target-type: ip

    # Subnet selection — ALB goes in public subnets (tagged kubernetes.io/role/elb=1)
    alb.ingress.kubernetes.io/subnets: subnet-0cc175ee6f9ddf4bd,subnet-0a0c8da4c742e333d,subnet-0a50d48404b0673ea  # Replace with public subnet IDs from terraform output

    # Security group for the ALB (allows HTTP/HTTPS from internet)
    alb.ingress.kubernetes.io/security-groups: sg-0461437f8302930db  # Replace with ALB SG from terraform output

    # Enable HTTP→HTTPS redirect (uncomment when SSL cert is set up)
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT:certificate/XXXX

    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Stickiness — useful for session-based workloads
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400

    # Tags on the ALB resource
    alb.ingress.kubernetes.io/tags: Project=ecommerce,Environment=prod,ManagedBy=kubernetes

    # Access logs (optional but useful for debugging and compliance)
    # alb.ingress.kubernetes.io/load-balancer-attributes: access_logs.s3.enabled=true,access_logs.s3.bucket=my-access-logs-bucket

  labels:
    app: ecommerce-ingress

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # API routes — all /api/* requests go to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80

          # Frontend — all other requests go to React/Nginx
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
